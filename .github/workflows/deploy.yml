name: Build and Deploy engram

on:
  push:
    branches: [ main ]
    # Disparar solo si cambian archivos de lógica
    paths:
      - 'bot/**'
      - 'core/**'
      - 'db/**'
      - 'services/**'
      - 'dashboard/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch: # Permite disparo manual

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build del Bot de Discord
      - name: Build and push Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/engram-bot:latest

      # Build del Dashboard (Next.js)
      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: ${{ secrets.DOCKER_USER }}/engram-dashboard:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Ir a la carpeta del proyecto
            cd ~/engram-rag-gemini-pinecone-discord
            
            # Actualizar archivos de configuración (docker-compose, etc)
            git fetch --all
            git reset --hard origin/main
            
            # Descargar imágenes nuevas
            docker compose pull
            
            # Reiniciar servicios con Healthcheck Check
            # --wait asegura que el bot esté 'ready' antes de dar el OK
            docker compose up -d --wait
            
            # Limpiar imágenes huérfanas para ahorrar espacio
            docker image prune -f
