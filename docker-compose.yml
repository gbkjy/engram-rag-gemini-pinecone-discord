services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: db_engram
      POSTGRES_USER: engram_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engram_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  engram_bot:
    build: .
    env_file: .env
    depends_on:
      - postgres
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/tmp/bot_ready') else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  dashboard:
    build: ./dashboard
    ports:
      - "3001:3000"
    env_file: .env
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data:
